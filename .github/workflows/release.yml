name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    # macOS runner so we can codesign + notarize; Bun cross-compiles the rest.
    runs-on: macos-14
    env:
      # public config baked into the binaries (no secrets here)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      XMIT_SERVER_URL: ${{ secrets.XMIT_SERVER_URL }}
      # signing (optional — steps skip if DEVELOPER_ID_APP is unset)
      DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
      # homebrew tap auto-update (optional — skips if TAP_TOKEN is unset)
      TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Compile binaries (config baked, no Ably secret)
        run: bun run compile:all

      - name: Fetch bundled mpv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run fetch-mpv macos-arm64 macos-x64 windows-x64

      - name: Package release archives
        run: bun run package

      - name: Sign + notarize macOS
        if: ${{ env.DEVELOPER_ID_APP != '' }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          NOTARY_PROFILE: xmit-notary
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/xmit.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --keychain "$KEYCHAIN"
          scripts/macos/sign.sh release/xmit-macos-arm64
          scripts/macos/sign.sh release/xmit-macos-x64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/xmit-*.zip
          generate_release_notes: true

      - name: Update Homebrew tap
        if: ${{ env.TAP_TOKEN != '' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          TAP_REPO: lukefreeman/homebrew-xmit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA="$(shasum -a 256 release/xmit-macos-arm64.zip | awk '{print $1}')"
          X64_SHA="$(shasum -a 256 release/xmit-macos-x64.zip | awk '{print $1}')"

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/xmit.rb <<RUBY
          class Xmit < Formula
            desc "Underground terminal music station"
            homepage "https://github.com/lukefreeman/xmit-client"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/lukefreeman/xmit-client/releases/download/v${VERSION}/xmit-macos-arm64.zip"
                sha256 "${ARM_SHA}"
              end
              on_intel do
                url "https://github.com/lukefreeman/xmit-client/releases/download/v${VERSION}/xmit-macos-x64.zip"
                sha256 "${X64_SHA}"
              end
            end

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"xmit"
            end

            test do
              assert_predicate libexec/"xmit", :exist?
            end
          end
          RUBY

          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/xmit.rb
          if git -C tap diff --cached --quiet; then
            echo "formula already up to date for ${VERSION}"
          else
            git -C tap commit -m "xmit ${VERSION}"
            git -C tap push
          fi
